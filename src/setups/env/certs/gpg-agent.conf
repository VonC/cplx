no-grab
# Absolute path required: GnuPG expands no variable in conf files, so a
# ${HOME} literal reaches exec verbatim and every prompt fails with
# 'No pinentry', masked for as long as the agent's passphrase cache
# lives. The wrapper adds the lib64 of the relocated git tools before
# launching pinentry-tty; the installer's relocation text pass rewrites
# the /home/upipdfs01/ anchor on deploy.
pinentry-program /home/upipdfs01/tools/certs/pinentry-wrapper.sh
default-cache-ttl 86400
max-cache-ttl 86400
allow-loopback-pinentry
debug-level basic
log-file /home/upipdfs01/tools/certs/gpg.log
